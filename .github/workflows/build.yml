name: Build & Deploy Dashboard

on:
  schedule:
    - cron: "0 */6 * * *"   # rebuild every 6 hours
  push:
    branches: [main]         # also rebuild on every push
  workflow_dispatch:         # allow manual "Run workflow" from the GitHub UI

permissions:
  contents: write            # needed to commit index.html back
  pull-requests: write       # needed to update matching PR descriptions

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TARGET_REF: ${{ github.head_ref || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_REF }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate dashboard
        run: python3 eng_brand_machine.py

      - name: Commit & push index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "chore: regenerate dashboard [skip ci]"
          git push origin HEAD:${TARGET_REF}

      - name: Update matching PR description
        if: github.event_name != 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const branch = process.env.TARGET_REF;
            const markerStart = '<!-- dashboard-build-status:start -->';
            const markerEnd = '<!-- dashboard-build-status:end -->';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const statusBlock = [
              markerStart,
              '### Dashboard branch build',
              '',
              `- Branch: \`${branch}\``,
              `- Workflow run: [${context.workflow} #${context.runNumber}](${runUrl})`,
              '- Status: `index.html` regenerated and pushed to this branch.',
              markerEnd,
            ].join('\n');

            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open',
              per_page: 1,
            });

            if (!pulls.length) {
              core.info(`No open PR found for ${branch}; skipping PR description update.`);
              return;
            }

            const pr = pulls[0];
            const currentBody = pr.body || '';
            const markerPattern = new RegExp(`${markerStart}[\\s\\S]*?${markerEnd}\\n?`, 'm');
            const nextBody = markerPattern.test(currentBody)
              ? currentBody.replace(markerPattern, `${statusBlock}\n`)
              : `${currentBody}${currentBody ? '\n\n' : ''}${statusBlock}`;

            if (nextBody === currentBody) {
              core.info('PR description already up to date.');
              return;
            }

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              body: nextBody,
            });
